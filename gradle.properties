# ── Gradle JVM 参数 ───────────────────────────────────────────────────────────
# 增大堆内存：Compose 编译器内存占用较高，建议 >= 2g
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# 并行构建：多模块项目有明显加速效果（单模块也略有帮助）
org.gradle.parallel=true

# 配置缓存：缓存 Gradle 配置阶段的结果（Gradle 8.x 已稳定）
org.gradle.configuration-cache=true

# 构建缓存：跨构建复用 task 输出
org.gradle.caching=true

# 按需配置：只配置实际需要的子项目（多模块加速）
org.gradle.configureondemand=true

# ── Android 功能开关 ──────────────────────────────────────────────────────────
# 使用 AndroidX 依赖
android.useAndroidX=true

# 不在构建时生成 R 类的传递性依赖（推荐开启，减少 R8 体积）
android.nonTransitiveRClass=true

# ── Kotlin ────────────────────────────────────────────────────────────────────
# Kotlin 2.0 + 独立 Compose 编译器插件（compose.compiler 插件从 Kotlin 中分离）
kotlin.incremental=true
