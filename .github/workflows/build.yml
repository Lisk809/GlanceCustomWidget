name: Android CI

# ── 触发条件 ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main", "master", "develop" ]
    tags:
      - "v*.*.*"          # 推送 v1.0.0 这样的 tag 时触发 Release 构建
  pull_request:
    branches: [ "main", "master" ]

# 同一分支上的新推送会取消还在运行的旧 workflow，节省 Actions 分钟数
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Job 1: lint — 静态分析，快速失败
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"    # Eclipse Temurin，免费且稳定

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行 Lint
        run: ./gradlew lintDebug --stacktrace

      - name: 上传 Lint 报告
        if: always()    # 即使 lint 失败也上传报告，方便查看
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════════════
  # Job 2: build-debug — Debug APK 构建（PR 和普通推送）
  # ════════════════════════════════════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: lint          # lint 通过后才构建

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14    # 保留 14 天

  # ════════════════════════════════════════════════════════════════════════════
  # Job 3: build-release — Release APK，仅在推送 tag 时触发
  #   需要在仓库 Settings → Secrets 中配置签名相关的 Secrets：
  #     KEYSTORE_BASE64   : base64 编码的 .jks 文件内容
  #     KEYSTORE_PASSWORD : keystore 密码
  #     KEY_ALIAS         : key alias
  #     KEY_PASSWORD      : key 密码
  # ════════════════════════════════════════════════════════════════════════════
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')   # 只在 tag 推送时运行

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 授予 gradlew 执行权限
        run: chmod +x gradlew

      # 将 base64 编码的 keystore 还原为文件
      # 生成方式：base64 -i your.jks | pbcopy  然后存入 Secret
      - name: 还原签名 Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      # 构建并签名 Release APK
      # 签名参数通过环境变量传入 Gradle，避免明文出现在日志中
      - name: 构建并签名 Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      # 提取版本号（去掉 tag 前缀 "v"），用于文件命名
      - name: 提取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 重命名 APK，包含版本号，方便识别
      - name: 重命名 Release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/GlanceCustomWidget-${{ steps.version.outputs.VERSION }}.apk

      - name: 上传 Release APK（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.VERSION }}
          path: app/build/outputs/apk/release/GlanceCustomWidget-*.apk
          retention-days: 90

      # 自动创建 GitHub Release 并附上 APK
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/GlanceCustomWidget-*.apk
          generate_release_notes: true    # 自动从 commit 历史生成 changelog
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 安全清理：删除磁盘上的 keystore，防止残留
      - name: 清理 Keystore 文件
        if: always()
        run: rm -f app/release.jks
